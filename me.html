<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEHUMAN | About</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,700;1,9..144,900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0c0e;
            --card: #13151a;
            --border: rgba(255,255,255,0.06);
            --accent: #c9f135;
            --accent-dim: rgba(201,241,53,0.12);
            --text: #ede9e0;
            --muted2: #878fa3;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

        /* ── MATCHING NAV ── */
        nav {
            background: rgba(11,12,14,0.85);
            backdrop-filter: blur(20px);
            padding: 0 5%;
            height: 80px; /* Matching the bigger logo height */
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo-container {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo-img { height: 80px; width: auto; display: block; }

        .logo-text {
            font-family: 'Fraunces', serif;
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: .08em;
            color: var(--text);
            text-transform: uppercase;
        }

        .back-link { 
            font-family: 'DM Mono', monospace; 
            color: var(--muted2); 
            text-decoration: none; 
            font-size: .75rem; 
            text-transform: uppercase;
            border: 1px solid var(--border);
            padding: 8px 16px;
            transition: all 0.2s;
        }
        .back-link:hover { color: var(--accent); border-color: var(--accent); }

        .content-container { max-width: 720px; margin: 80px auto; padding: 0 10%; }
        h1 { font-family: 'Fraunces', serif; font-size: 3.5rem; margin-bottom: 2rem; }
        p { font-size: 1.1rem; color: var(--muted2); margin-bottom: 1.5rem; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo-container">
        <img src="logo.png" alt="" class="brand-logo-img" onerror="this.style.display='none'">
        <span class="logo-text">DEHUMAN</span>
    </a>
    <a href="index.html" class="back-link">Return Home</a>
</nav>

<main class="content-container">
    <h1>About Me!</h1>
    <p>Hai! You can call me star. For safety reasons I wish to keep my identity hidden. <img src="logo.gif" width="50"></p>
</main>

</body>
</html>
